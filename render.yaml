databases:
  - name: formbridge-postgres
    plan: free

services:
  - type: web
    name: formbridge-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SYNC_ALTER
        value: true
      - key: DB_SSL
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: formbridge-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FORMBRIDGE_WEBHOOK_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_LOGIN_REDIRECT_URI
        sync: false
      - key: GOOGLE_OAUTH_SUCCESS_URL
        sync: false
      - key: GOOGLE_OAUTH_ERROR_URL
        sync: false
      - key: GOOGLE_LOGIN_SUCCESS_URL
        sync: false
      - key: GOOGLE_LOGIN_ERROR_URL
        sync: false
      - key: DEMO_GOOGLE_ACCOUNT_EMAIL
        sync: false
